<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>익명 채팅</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        /* 채팅창 영역: 아이디가 chatBox인지 반드시 확인! */
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .system { background: #eee; text-align: center; font-size: 0.8em; }
        .input-area { padding: 10px; display: flex; gap: 10px; background: white; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) send()">
        <button onclick="send()">전송</button>
    </div>

    <script>
        // 3. 변수를 미리 선언하지 않고 함수 내부에서 확실히 잡습니다.
        const socket = io();

        // 페이지 로드 즉시 실행되는 닉네임 설정
        const myNickname = prompt("닉네임을 입력하세요") || "익명";
        socket.emit('set_nickname', myNickname);

        socket.on('user_info', (data) => {
            console.log("내 닉네임 확정:", data.name);
        });

        // 메시지 전송 함수
        function send() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            socket.emit('send_message', input.value);
            input.value = '';
        }

        // 메시지 수신 로직 (에러 발생 지점 수정)
        socket.on('receive_message', (data) => {
            // 수신 시점에 직접 요소를 찾아서 null 에러를 방지합니다.
            const chatBox = document.getElementById('chatBox');
            
            if (chatBox) {
                const div = document.createElement('div');
                div.className = data.user === '시스템' ? 'msg system' : 'msg';
                div.innerHTML = `<strong>${data.user}</strong>: ${data.text}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            } else {
                console.error("에러: chatBox 요소를 찾을 수 없습니다.");
            }
        });
    </script>
</body>
</html>
